name: Build AmneziaWG for Cudy TR3000 (ImmortalWrt 24.10.5)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget curl

    - name: Download and extract ImmortalWrt SDK
      run: |
        # Точная ссылка на SDK 24.10.5 для Mediatek Filogic
        SDK_URL="https://downloads.immortalwrt.org/releases/24.10.5/targets/mediatek/filogic/immortalwrt-sdk-24.10.5-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
        wget -O sdk.tar.xz $SDK_URL
        tar -xf sdk.tar.xz
        mv immortalwrt-sdk-* sdk_dir

    - name: Update feeds and add AmneziaWG source
      run: |
        cd sdk_dir
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # Клонируем форк AWG
        git clone https://github.com/Slava-Shchipunov/awg-openwrt.git package/amneziawg

    - name: Configure and build packages
      run: |
        cd sdk_dir
        
        # Генерируем стандартный конфиг SDK
        make defconfig
        
        # Принудительно включаем пакеты AWG как модули (m)
        echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
        echo "CONFIG_PACKAGE_amneziawg-tools=m" >> .config
        echo "CONFIG_PACKAGE_luci-proto-amneziawg=m" >> .config
        
        # Применяем новые настройки
        make defconfig
        
        # Собираем AWG с использованием всех доступных ядер процессора (-j)
        make package/amneziawg/compile V=s -j$(nproc)

    - name: Collect IPK files
      run: |
        mkdir -p awg-packages
        # Ищем все собранные файлы .ipk, содержащие в названии amneziawg
        find sdk_dir/bin/ -type f -name "*amneziawg*.ipk" -exec cp {} awg-packages/ \;

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: amneziawg-immortalwrt-24.10.5-cudy-tr3000
        path: awg-packages/*.ipk
        retention-days: 7
